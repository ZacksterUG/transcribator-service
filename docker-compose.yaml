version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      - transcription-net

  nats:
    image: nats:2.10-alpine
    container_name: nats-server
    ports:
      - "4222:4222"  
      - "8222:8222"  
      - "6222:6222" 
    volumes:
      - nats_data:/data 
    command: >
      --name transcription-nats
      --http_port 8222
      --debug
      --trace
      --jetstream
      --store_dir /data
    networks:
      - transcription-net

  redis:
    image: redis:7.2-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_:/data
    command: redis-server --appendonly yes --save 60 1 --dir /data --requirepass ${REDIS_PASSWORD}
    networks:
      - transcription-net

  db:
    image: postgres:15
    container_name: transcription-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: transcription_db
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
    volumes:
      - pg_:/var/lib/postgresql/data
    networks:
      - transcription-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-web
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      - db
    networks:
      - transcription-net

  migrate:
    image: liquibase/liquibase:4.27
    depends_on:
      - db
    volumes:
      - ./db:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://db:5432/transcription_db
      --username=postgres
      --password=postgres
      --changeLogFile=changelog-master.xml
      --classpath=/liquibase/changelog
      update
    networks:
      - transcription-net

  transcribator-async:
    container_name: transcribator-async
    build:
      context: ./transcribator-services/async
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - nats
      - redis
      - minio
    volumes:
      - ./models:/app/models
    environment:
      - STORAGE_TYPE=${STORAGE_TYPE}
      - MINIO_URL=${MINIO_URL}
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - QUEUE_TYPE=${QUEUE_TYPE}
      - NATS_SERVERS=${NATS_SERVERS}
      - REQUEST_TOPIC=${REQUEST_TOPIC}
      - RESPONSE_TOPIC=${RESPONSE_TOPIC}
      - MODEL_PATH_OR_SIZE=${MODEL_PATH_OR_SIZE}
      - MODEL_DEVICE=${MODEL_DEVICE}
      - MODEL_COMPUTE_TYPE=${MODEL_COMPUTE_TYPE}
      - MODEL_NUM_WORKERS=${MODEL_NUM_WORKERS}
      - TEMP_DIR=${TEMP_DIR}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${ASYNC_REDIS_DB}
      - MODEL_TYPE=faster-whisper
    networks:
      - transcription-net

  transcribator-sync:
    container_name: transcribator-sync
    build:
      context: ./transcribator-services/sync
      dockerfile: Dockerfile
    depends_on:
      - nats
      - redis
    volumes:
      - ./models:/app/models
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${ASYNC_REDIS_DB}
      - NATS_SERVERS=${NATS_SERVERS}
      - MAIN_TOPIC=${SYNC_MAIN_TOPIC}
      - MODEL_TOKENS=${SYNC_MODEL_TOKENS}
      - MODEL_ENCODER=${SYNC_MODEL_ENCODER}
      - MODEL_DECODER=${SYNC_MODEL_DECODER}
      - MODEL_JOINER=${SYNC_MODEL_JOINER}
      - MODEL_NUM_THREADS=${SYNC_MODEL_NUM_THREADS}
      - MODEL_SAMPLE_RATE=${SYNC_MODEL_SAMPLE_RATE}
      - MODEL_FEATURE_DIM=${SYNC_MODEL_FEATURE_DIM}
      - MODEL_DECODING_METHOD=${SYNC_MODEL_DECODING_METHOD}
      - MODEL_ENABLE_ENDPOINT_DETECTION=${SYNC_MODEL_ENABLE_ENDPOINT_DETECTION}
      - MODEL_RULE1_MIN_TRAILING_SILENCE=${SYNC_MODEL_RULE1_MIN_TRAILING_SILENCE}
      - MODEL_RULE2_MIN_TRAILING_SILENCE=${SYNC_MODEL_RULE2_MIN_TRAILING_SILENCE}
      - MODEL_RULE3_MIN_UTTERANCE_LENGTH=${SYNC_MODEL_RULE3_MIN_UTTERANCE_LENGTH}
      - MAX_ACTIVE_STREAMS=${SYNC_MAX_ACTIVE_STREAMS}
      - JOB_ACTIVE_TIMEOUT=${SYNC_JOB_ACTIVE_TIMEOUT}
    networks:
      - transcription-net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak-server
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRESQL_USER}
      KC_DB_PASSWORD: ${POSTGRESQL_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    command: start-dev
    depends_on:
      - db
    networks:
      - transcription-net

        
networks:
  transcription-net:
    driver: bridge

volumes:
  minio_: {}
  redis_: {}
  pg_: {}
  nats_data: {}
  api_uploads: {}