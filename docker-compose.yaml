version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      - transcription-net

  nats:
    image: nats:2.10-alpine
    container_name: nats-server
    ports:
      - "4222:4222"  
      - "8222:8222"  
      - "6222:6222" 
    volumes:
      - nats_data:/data 
    command: >
      --name transcription-nats
      --http_port 8222
      --debug
      --trace
      --jetstream
      --store_dir /data
    networks:
      - transcription-net

  redis:
    image: redis:7.2-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_:/data
    command: redis-server --appendonly yes --save 60 1 --dir /data --requirepass ${REDIS_PASSWORD}
    networks:
      - transcription-net

  db:
    image: postgres:15
    container_name: transcription-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: transcription_db
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
    volumes:
      - pg_:/var/lib/postgresql/data
    networks:
      - transcription-net

  migrate:
    image: liquibase/liquibase:4.27
    depends_on:
      - db
    volumes:
      - ./db:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://db:5432/transcription_db
      --username=postgres
      --password=postgres
      --changeLogFile=changelog-master.xml
      --classpath=/liquibase/changelog
      update
    networks:
      - transcription-net

  transcribator-async:
    container_name: transcribator-async
    build:
      context: ./transcribator-services/async
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - nats
      - redis
      - minio
    volumes:
      - ./models:/app/models
    environment:
      - STORAGE_TYPE=${STORAGE_TYPE}
      - MINIO_URL=${MINIO_URL}
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - QUEUE_TYPE=${QUEUE_TYPE}
      - NATS_SERVERS=${NATS_SERVERS}
      - REQUEST_TOPIC=${REQUEST_TOPIC}
      - RESPONSE_TOPIC=${RESPONSE_TOPIC}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_PATH_OR_SIZE=${MODEL_PATH_OR_SIZE}
      - MODEL_DEVICE=${MODEL_DEVICE}
      - MODEL_COMPUTE_TYPE=${MODEL_COMPUTE_TYPE}
      - MODEL_NUM_WORKERS=${MODEL_NUM_WORKERS}
      - TEMP_DIR=${TEMP_DIR}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${ASYNC_REDIS_DB}
    networks:
      - transcription-net

networks:
  transcription-net:
    driver: bridge

volumes:
  minio_: {}
  redis_: {}
  pg_: {}
  nats_data: {} 